name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Smoke test
        run: ./scripts/smoke_test.sh
      - name: Repository quality gate
        run: ./scripts/repo_quality_gate.sh
